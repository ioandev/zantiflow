# Static file server for the Starlight build (ADR-0048). nginx-unprivileged listens on 8080; TLS +
# security headers are terminated upstream by Caddy (deploy/Caddyfile.example, docs.<domain> block).
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Starlight emits directory-style pages (foo/index.html) + a top-level 404.html.
    location / {
        try_files $uri $uri/ =404;
    }
    error_page 404 /404.html;

    # Fingerprinted assets are immutable → long-cache; HTML is revalidated by default.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
