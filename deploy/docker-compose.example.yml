# zantiflow — example deployment (self-host or hosted). See ADR-0021 + ADR-0018 §8.
#
#   cp deploy/docker-compose.example.yml docker-compose.yml
#   cp deploy/.env.example .env      # then fill it in — NEVER commit .env
#   cp deploy/Caddyfile.example Caddyfile   # set your domain
#   docker compose up -d
#
# Security posture (security-audit §I): MariaDB + backend publish NO host ports (only Caddy does);
# non-root pinned images; per-service memory limits; secrets via .env; TLS + security headers at Caddy.

name: zantiflow

services:
  mariadb:
    image: mariadb:11.4                     # pinned — no :latest in prod (audit I8)
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: zantiflow
      MARIADB_USER: zantiflow
      MARIADB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?set DB_ROOT_PASSWORD in .env}
    volumes:
      - mariadb-data:/var/lib/mysql
    # NO ports: → MariaDB is reachable only on the compose network, never from the host/internet (I3)
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
    mem_limit: 512m

  backend:
    image: zantiflow/backend:0.1.0          # from Docker Hub (pinned). Or `build: ../apps/backend` in dev.
    restart: unless-stopped
    env_file: .env                          # DATABASE_URL, TOKEN_SECRET, GOOGLE_*, VAPID_*, BOT_SERVICE_SECRET, …
    depends_on:
      mariadb:
        condition: service_healthy
    # NO published port — reached only via `web`. Entrypoint runs `prisma migrate deploy` before start.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  web:
    image: zantiflow/web:0.1.0
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # NOTE: BACKEND_URL is baked into the image at BUILD time (next.config `rewrites()` is evaluated
      # by `next build`, not at server start) — the zantiflow/web image already defaults to
      # http://backend:4000, matching this service name. This runtime env has NO effect; to target a
      # different backend host, rebuild with --build-arg BACKEND_URL=… (ADR-0018 §8).
      BACKEND_URL: http://backend:4000      # the web tier proxies /api/v1 → backend (informational)
      NEXT_PUBLIC_SITE_URL: ${WEB_ORIGIN}   # public origin, so OG/Twitter card image URLs are absolute
    depends_on:
      backend:
        condition: service_healthy
    # NO published port — reached only via Caddy.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  docs:
    image: zantiflow/docs:0.1.0             # Starlight static site (ADR-0048), served at docs.<domain>
    restart: unless-stopped
    # NO published port — reached only via Caddy. Non-root nginx on 8080; all-static, no env/secrets.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
    mem_limit: 128m

  caddy:
    image: caddy:2                          # TLS termination + security headers/CSP (ADR-0018 §8, audit #5)
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - docs

  # --- Optional pro-notification bots (ADR-0007 / ADR-0010). Uncomment to enable. ---
  # discord-bot:
  #   image: zantiflow/discord-bot:0.1.0
  #   restart: unless-stopped
  #   env_file: .env                        # DISCORD_BOT_TOKEN, DISCORD_APP_ID, DISCORD_GUILD_ID, BACKEND_WS_URL, BOT_SERVICE_SECRET
  #   depends_on: [backend]
  #   mem_limit: 256m
  # telegram-bot:
  #   image: zantiflow/telegram-bot:0.1.0
  #   restart: unless-stopped
  #   env_file: .env                        # TELEGRAM_BOT_TOKEN, BACKEND_WS_URL, BOT_SERVICE_SECRET
  #   depends_on: [backend]
  #   mem_limit: 256m

volumes:
  mariadb-data:
  caddy-data:
  caddy-config:
